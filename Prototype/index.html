<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div id="calculator">

        <div id="display">
            <input type="text" id="screen" value= "" required >
        </div>

        <div id="calculator-body">

            <div id="number-keys">
                <button class="display-keys" data-value="7">7</button>
                <button class="display-keys" data-value="8">8</button>
                <button class="display-keys" data-value="9">9</button>
                <button class="display-keys" data-value="4">4</button>
                <button class="display-keys" data-value="5">5</button>
                <button class="display-keys" data-value="6">6</button>
                <button class="display-keys" data-value="1">1</button>
                <button class="display-keys" data-value="2">2</button>
                <button class="display-keys" data-value="3">3</button>
                <button class="display-keys" data-value=".">.</button>
                <button class="display-keys" data-value="0">0</button>
                <button class="display-keys" data-value="%">%</button>

            </div>

            <div id="right-keys">

                <div id="special-keys">
                 <button class="inv" data-value="inv">INV</button>
                 
                 <button class="display-keys" data-value="&#8730">&#8730</button>
                 <button class="display-keys" data-value="&#8731">&#8731 </button>
                 <button class="display-keys" data-value="&#179">&#179 </button>

                 <button class="display-keys" data-value="ˆ">ˆ</button>
                 <button class="display-keys" data-value="log">log</button>
                 <button class="display-keys" data-value="(">(</button>
                 <button class="display-keys" data-value=")">)</button>   
                 
                 <button class="display-keys" data-value="cos(">cos</button>
                 <button class="display-keys" data-value="sin(">sin</button>
                 <button class="display-keys" data-value="tan(">tan</button>
                 
                 <button class="display-keys" data-value="&#x3c0">&#x3c0 </button>
                </div>

                <div id="operator-keys">
                    <button class="display-keys" data-value="+">+</button>
                    <button class="display-keys" data-value="-">-</button>
                    <button class="display-keys" data-value="x">&times;</button>
                    <button class="display-keys" data-value="&divide;">&divide;</button>
                    <button data-value="">C</button>
                    <button data-value="">DEL</button>
                    <button data-value=".">.</button>
                    <button data-value="">=</button>

                </div>
                
            </div>
                
            <div id="inverse-keys">
                <button class="inv" data-value="">INV</button>
                <button class="display-keys" data-value="cos-1(">cos<sup>-1</sup></button>
                <button class="display-keys" data-value="sin-1(">sin<sup>-1</sup></button>
                <button class="display-keys" data-value="tan-1(">tan<sup>-1</sup></button>
                <button class="display-keys" data-value="sec(">sec</button>
                <button class="display-keys" data-value="csec(">csec</button>
                <button class="display-keys" data-value="cot(">cot</button>
                <button class="display-keys" data-value="!">!</button>
                
                <button class="display-keys" data-value="e">e</button>
                <button class="display-keys" data-value="10^">10^</button>
                <button data-value="">DEG</button>
                <button data-value="">RAD</button>
            </div>
        </div>

    </div>

    <script src="src/main.js"></script>
</body>
</html>
