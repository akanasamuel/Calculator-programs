<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div id="calculator">

        <div id="display">
            <input type="text" id="screen" value= "0" required >
        </div>


        <div id="calculator-body">

            <div id="number-keys">
                <button data-value="7">7</button>
                <button data-value="8">8</button>
                <button data-value="9">9</button>
                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="3">3</button>
                <button data-value=".">.</button>
                <button data-value="0">0</button>
                <button data-value="%">%</button>

            </div>

            <div id="right-keys">

                <div id="special-keys">
                 <button data-value="&#x3c0">&#x3c0 </button>
                 <button data-value="&#8730">&#8730</button>
                 <button data-value="&#8731">&#8731 </button>
                 <button data-value="&#179">&#179 </button>

                 <button data-value="ˆ">ˆ</button>
                 <button data-value="log">log</button>
                 <button data-value="(">(</button>
                 <button data-value=")">)</button>   
                </div>

                <div id="operator-keys">
                    <button data-value="+">+</button>
                    <button data-value="-">-</button>
                    <button data-value="*">&times;</button>
                    <button data-value="/">&divide;</button>
                    <button data-value="clear">C</button>
                    <button data-value="delete">DEL</button>
                    <button data-value=".">.</button>
                    <button data-value="equals">=</button>

                </div>

            </div>

        </div>

    </div>


</body>
</html>
