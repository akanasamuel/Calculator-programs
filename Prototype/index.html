<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>

    <div class="calculator" id="calculator">

        
        <div class="display" id="display">
            <input type="text" class="screen" id="screen" value= "0" required >
        </div>

        
        <div class="calculator-body" id="calculator-body">

            
            <div class="number-keys" id="number-keys">
                <button type="button" class="key number" data-value="7">7</button>
                <button type="button" class="key number" data-value="8">8</button>
                <button type="button" class="key number" data-value="9">9</button>
                <button type="button" class="key number" data-value="4">4</button>
                <button type="button" class="key number" data-value="5">5</button>
                <button type="button" class="key number" data-value="6">6</button>
                <button type="button" class="key number" data-value="1">1</button>
                <button type="button" class="key number" data-value="2">2</button>
                <button type="button" class="key number" data-value="3">3</button>
                <button type="button" class="key number" data-value=".">.</button>
                <button type="button" class="key number" data-value="0">0</button>
              
            </div>


            <div class="right-keys" id="right-keys">

       
                <div class="special-keys" id="special-keys">
                 <button type="button" class="key operator" data-value="&#x3c0">&#x3c0 </button>
                 <button type="button" class="key operator" data-value="&#8730">&#8730</button>
                 <button type="button" class="key operator" data-value="&#8731">&#8731 </button>
                 <button type="button" class="key operator" data-value="&#179">&#179 </button>
                
                 <button type="button" class="key special" data-value="ˆ">ˆ</button>
                 <button type="button" class="key special" data-value="%">%</button>
                 <button type="button" class="key special" data-value="(">(</button>
                 <button type="button" class="key special" data-value=")">)</button>   
                </div>
           
           
                
                <div class="operator-keys" id="operator-keys">
                    <button type="button" class="key operator" data-value="+">+</button>
                    <button type="button" class="key operator" data-value="-">-</button>
                    <button type="button" class="key operator" data-value="*">&times;</button>
                    <button type="button" class="key operator" data-value="/">&divide;</button>
                   <button type="button" class="key special" data-value="clear">C</button>
                   <button type="button" class="key special" data-value="delete">DEL</button>
                   <button type="button" class="key special" data-value=".">.</button>
                   <button type="button" class="key special" data-value="equals">=</button>
                
                </div>

                
             

            </div>

        </div>

    </div>


</body>
</html>
